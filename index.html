<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Studio</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #111827;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-title {
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin: 1rem 0 0;
      }
      #splash-spark {
        position: relative;
        width: 8.5rem;
        height: 8rem;
      }
      #splash-spark .s {
        position: absolute;
        color: #ffffff;
        line-height: 1;
        animation: sp-fade 1.8s ease-in-out infinite;
      }
      /* Kleines Funkeln: links-mittig oben */
      #splash-spark .s1 { font-size: 2.2rem; left: 1.6rem; top: 0.6rem; animation-delay: 0.65s; }
      /* Grosses Funkeln: rechts, vertikal zentriert */
      #splash-spark .s2 { font-size: 7.5rem; right: 0; top: 50%; transform: translateY(-50%); animation-delay: 0s; }
      /* Mittleres Funkeln: links unten */
      #splash-spark .s3 { font-size: 3.8rem; left: 0; bottom: 0; animation-delay: 1.2s; }
      @keyframes sp-fade {
        0%, 100% { opacity: 0.1; }
        50%       { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-spark">
        <span class="s s1">✦</span>
        <span class="s s2">✦</span>
        <span class="s s3">✦</span>
      </div>
      <p id="splash-title">Teacher Studio</p>
    </div>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
